name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-cards:
    runs-on: ubuntu-latest
    name: Build Lovelace Cards
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: lovelace-astrospheric-cards
        run: npm ci

      - name: Build
        working-directory: lovelace-astrospheric-cards
        run: npm run build

      - name: Upload card JS to release
        uses: softprops/action-gh-release@v2
        with:
          files: lovelace-astrospheric-cards/dist/astrospheric-cards.js
